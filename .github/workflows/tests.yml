name: Tests

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"

jobs:
  unittest:
    name: Python 3.10 unittest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run inventory tests
        run: python -m unittest discover -s tests -p "test_service.py" -v

      - name: Run database tests
        run: python -m unittest discover -s tests -p "test_database.py" -v

      - name: Run About page tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -p "test_about.py" -v

      - name: Run release tooling tests
        run: python -m unittest discover -s tests -p "test_release_tools.py" -v
