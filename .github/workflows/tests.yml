name: Tests

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop
      - "feature/**"
      - "release/**"
      - "hotfix/**"

jobs:
  unittest:
    name: Python 3.10 unittest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run inventory tests
        run: python -m unittest discover -s tests -p "test_service.py" -v

      - name: Run database tests
        run: python -m unittest discover -s tests -p "test_database.py" -v

      - name: Run Dashboard tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -p "test_dashboard.py" -v

      - name: Test About page content
        env:
          QT_QPA_PLATFORM: offscreen
        run: >-
          python -m unittest discover -s tests -p "test_about.py"
          -k test_about_tab_displays_version_and_developer -v

      - name: Test About page links
        env:
          QT_QPA_PLATFORM: offscreen
        run: >-
          python -m unittest discover -s tests -p "test_about.py"
          -k test_about_links_use_expected_github_urls -v

      - name: Test package version metadata
        env:
          QT_QPA_PLATFORM: offscreen
        run: >-
          python -m unittest discover -s tests -p "test_about.py"
          -k test_package_metadata_uses_the_runtime_version -v

      - name: Run release tooling tests
        run: python -m unittest discover -s tests -p "test_release_tools.py" -v
